  # 2. Advanced Multicore BTC Bot (Sniper - R$ 200)
  btc-master-bot:
    build: .
    container_name: btc_multicore_bot
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_started
    env_file:
      - .env
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - OLLAMA_URL=http://ollama:11434/api/generate
      - SHADOW_MODE=True
    command: [ "python", "-u", "multicore_master_bot.py", "--mode", "backtest" ]
    volumes:
      - ./results:/app/results
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - quant_net

  # 3. Market Memory Graph (Neo4j)
  neo4j:
    image: neo4j:latest
    container_name: btc_market_memory
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt Driver
    environment:
      - NEO4J_AUTH=neo4j/password
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      retries: 5
      start_period: 240s
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j/logs:/logs
    networks:
      - quant_net

  # 4. Observatorio Tatico de Logs
  dozzle:
    image: amir20/dozzle:latest
    container_name: btc_dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - quant_net

  # 5. Local LLM Fallback (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: btc_ollama_fallback
    restart: unless-stopped
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - quant_net
    deploy:
      resources:
        limits:
          memory: 4G


version: '3.8'

services:
  basis-arb-bot:
    build: .
    container_name: cofre_quantitativo_bot
    restart: unless-stopped
    env_file: .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge


networks:
  quant_net:
    driver: bridge

services:
  # 1. MiroFish Sentiment Engine (Backend)
  mirofish-backend:
    build: ./MiroFish
    container_name: mirofish_engine
    command: [ "uv", "run", "--project", "backend", "python", "backend/run.py" ]
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - FLASK_PORT=8000
    env_file:
      - ./MiroFish/.env
    networks:
      - quant_net
    volumes:
      - ./MiroFish/backend/uploads:/app/backend/uploads

  # 2. Advanced Multicore BTC Bot
  btc-master-bot:
    build: .
    container_name: btc_multicore_bot
    restart: unless-stopped
    depends_on:
      mirofish-backend:
        condition: service_started
      neo4j:
        condition: service_healthy
    environment:
      - MIROFISH_API_URL=http://mirofish-backend:8000/api
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    command: [ "python", "-u", "multicore_master_bot.py" ]
    networks:
      - quant_net

  # 3. Market Memory Graph (Neo4j)
  neo4j:
    image: neo4j:latest
    container_name: btc_market_memory
    restart: unless-stopped
    user: "7474:7474"
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt Driver
    environment:
      - NEO4J_AUTH=neo4j/password
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j/logs:/logs
    networks:
      - quant_net

  # 4. Observatorio Tatico de Logs
  dozzle:
    image: amir20/dozzle:latest
    container_name: btc_dozzle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - quant_net

  # 5. Push Notifications Engine
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: btc_ntfy
    restart: unless-stopped
    command: serve
    ports:
      - "8081:80"
    networks:
      - quant_net
